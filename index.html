<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Point Battle</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; touch-action: manipulation; }
        .container { max-width: 400px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .info-bar { display: flex; justify-content: space-between; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
        .score-board { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #333; border-radius: 15px; padding: 12px; margin-bottom: 15px; border: 1px solid #444; }
        .status-val { font-size: 1.2rem; font-weight: bold; color: #00e5ff; }
        .card-area { display: flex; justify-content: center; gap: 8px; margin: 10px 0; min-height: 90px; }
        .card { width: 60px; height: 90px; background: #2a2a2a; border: 2px solid #444; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; cursor: pointer; transition: 0.3s; color: #666; }
        .card.open { background: #fff; color: #000; border-color: #ffd700; box-shadow: 0 0 10px #ffd700; }
        .card.hidden-active { background: #444; color: #00e5ff; border: 2px solid #00e5ff; }
        .card.used { background: #111; border: 1px dashed #333; color: #333; cursor: default; }
        .msg-box { height: 85px; color: #ffd700; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; line-height: 1.4; padding: 0 10px; }
        .controls { display: grid; grid-template-columns: 1fr; gap: 10px; }
        button { padding: 16px; border-radius: 15px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .btn-next { background: #00e5ff; color: #000; }
        .btn-stop { background: #ff3d00; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="info-bar">
        <span>GAME: <span id="game-count">1</span> / 3</span>
        <span>TOTAL: <span id="total-score">0</span> pt</span>
    </div>
    <div class="score-board">
        <div>PLAYER<br><span id="p-wins" class="status-val">0</span> / 3勝<br><small>LIFE: <span id="p-life">10</span></small></div>
        <div>CPU<br><span id="c-wins" class="status-val">0</span> / 3勝<br><small>LIFE: <span id="c-life">10</span></small></div>
    </div>

    <p style="font-size: 0.7rem; color: #888;">CPU'S FIELD</p>
    <div class="card-area" id="c-field">
        <div id="c-0" class="card">伏</div>
        <div id="c-1" class="card">伏</div>
        <div id="c-2" class="card">伏</div>
    </div>

    <div id="msg" class="msg-box">ベースの伏せ札を選んでください</div>

    <p style="font-size: 0.7rem; color: #888;">YOUR FIELD</p>
    <div class="card-area" id="p-field"></div>

    <div class="controls" id="ui-btns" style="display:none;">
        <button id="main-btn" class="btn-next" onclick="nextPhase()">加算へ (消費1pt)</button>
        <button class="btn-stop" onclick="showdown()">今の数値で勝負！</button>
    </div>
</div>

<script>
    let totalScore = 0;
    let currentGame = 1;
    let pWins = 0, cWins = 0;
    let pLife = 10, cLife = 10;
    
    let pHand, cHand, pData, cData, phase;

    function initRound() {
        pHand = [1, 0, -1].sort(() => Math.random() - 0.5);
        cHand = [1, 0, -1].sort(() => Math.random() - 0.5);
        pData = { base:0, add:0, mult:1, addOn: false };
        cData = { base:0, add:0, mult:1, addOn: false };
        phase = 1;

        document.getElementById('msg').innerHTML = "ベースの伏せ札を1枚選んでください<br><small>(1枚目はコスト0)</small>";
        document.getElementById('ui-btns').style.display = "none";
        for(let i=0; i<3; i++) {
            let c = document.getElementById(`c-${i}`);
            c.innerText = "伏"; c.className = "card";
        }
        renderPlayer();
    }

    function renderPlayer() {
        const area = document.getElementById('p-field');
        area.innerHTML = "";
        pHand.forEach((val, i) => {
            const el = document.createElement('div');
            el.className = val === "USED" ? "card used" : "card";
            el.innerText = (val === "USED") ? "済" : "伏";
            if(val !== "USED") el.onclick = () => tapCard(i);
            area.appendChild(el);
        });
    }

    function tapCard(idx) {
        if (phase === 1) {
            pData.base = pHand[idx];
            pHand[idx] = "USED";
            let cIdx = Math.floor(Math.random() * 3);
            cData.base = cHand[cIdx];
            cHand[cIdx] = "USED";

            document.getElementById('p-field').children[idx].innerText = pData.base;
            document.getElementById('p-field').children[idx].className = "card open";
            document.getElementById(`c-${cIdx}`).innerText = cData.base;
            document.getElementById(`c-${cIdx}`).className = "card open";

            phase = 2;
            document.getElementById('ui-btns').style.display = "grid";
            document.getElementById('main-btn').innerText = "加算へ (消費1pt)";
            document.getElementById('msg').innerHTML = "次は【加算】フェーズです。<br>カードを引くなら1pt消費します。";
        } else if (phase === 2 && !pData.addOn) {
            if(pLife <= 0) { alert("ポイントが足りません！"); return; }
            pLife--;
            pData.add = pHand[idx];
            pHand[idx] = "USED";
            pData.addOn = true;
            updateStats();
            renderPlayer();
            document.getElementById('p-field').children[idx].innerText = "加";
            document.getElementById('p-field').children[idx].className = "card hidden-active";
            cpuThinkAdd();
        } else if (phase === 3) {
            if(pLife <= 0) { alert("ポイントが足りません！"); return; }
            pLife--;
            pData.mult = pHand[idx];
            pHand[idx] = "USED";
            updateStats();
            cpuThinkMult();
            showdown();
        }
    }

    function cpuThinkAdd() {
        let shouldAdd = (cData.base <= 0 || (cData.base === 1 && Math.random() < 0.3)) && cLife > 0;
        if (shouldAdd) {
            cLife--;
            let avail = [];
            cHand.forEach((v, i) => { if(v !== "USED") avail.push(i); });
            let cIdx = avail[Math.floor(Math.random() * avail.length)];
            cData.add = cHand[cIdx];
            cHand[cIdx] = "USED";
            cData.addOn = true;
            document.getElementById(`c-${cIdx}`).innerText = "加";
            document.getElementById(`c-${cIdx}`).className = "card hidden-active";
            document.getElementById('msg').innerHTML = "CPUも1pt払い加算しました。";
        } else {
            document.getElementById('msg').innerHTML = "CPUは加算を見送りました。";
        }
        updateStats();
        phase = 3;
        document.getElementById('main-btn').innerText = "乗算へ (消費1pt)";
    }

    function cpuThinkMult() {
        let cLast = cHand.find(v => v !== "USED");
        let currentVal = cData.base + cData.add;
        if (cLife > 0 && (currentVal * cLast > currentVal)) {
            cLife--;
            cData.mult = cLast;
        }
        updateStats();
    }

    function nextPhase() {
        if (phase === 2) {
            document.getElementById('msg').innerHTML = "加算するカードをタップしてください<br>(1pt消費されます)";
        } else if (phase === 3) {
            document.getElementById('msg').innerHTML = "最後のカードをタップして乗算！<br>(1pt消費されます)";
            document.getElementById('main-btn').style.display = "none";
            renderPlayer();
        }
    }

    function updateStats() {
        document.getElementById('p-life').innerText = pLife;
        document.getElementById('c-life').innerText = cLife;
        document.getElementById('p-wins').innerText = pWins;
        document.getElementById('c-wins').innerText = cWins;
    }

    function showdown() {
        const pTotal = (pData.base + pData.add) * pData.mult;
        const cTotal = (cData.base + cData.add) * cData.mult;
        let res = `【結果】 YOU:${pTotal} vs CPU:${cTotal}\n`;
        if (pTotal > cTotal) { pWins++; res += "あなたの勝利！"; }
        else if (pTotal < cTotal) { cWins++; res += "CPUの勝利..."; }
        else { res += "引き分け"; }
        alert(res);
        updateStats();

        if (pWins >= 3 || cWins >= 3) {
            let gamePoints = pWins >= 3 ? pLife : 0;
            totalScore += gamePoints;
            alert(`ゲーム終了！\n獲得スコア: ${gamePoints}pt\nトータル: ${totalScore}pt`);
            
            currentGame++;
            if (currentGame > 3) {
                alert(`全3ゲーム終了！\n最終合計スコア: ${totalScore}pt`);
                location.reload();
            } else {
                pWins = 0; cWins = 0; pLife = 10; cLife = 10;
                document.getElementById('game-count').innerText = currentGame;
                document.getElementById('total-score').innerText = totalScore;
                initRound();
            }
        } else {
            initRound();
        }
    }

    initRound();
</script>
</body>
</html>
