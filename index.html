<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psychological Card Battle</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; touch-action: manipulation; }
        .container { max-width: 400px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .score-board { display: flex; justify-content: space-around; background: #333; border-radius: 15px; padding: 10px; margin-bottom: 15px; border: 1px solid #444; font-weight: bold; }
        .card-area { display: flex; justify-content: center; gap: 8px; margin: 10px 0; min-height: 90px; }
        .card { width: 60px; height: 90px; background: #2a2a2a; border: 2px solid #444; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; cursor: pointer; transition: 0.3s; color: #666; }
        .card.open { background: #fff; color: #000; border-color: #00e5ff; box-shadow: 0 0 10px #00e5ff; }
        .card.hidden-active { background: #444; color: #ffd700; border: 2px solid #ffd700; } /* 伏せているが場に出ている */
        .card.used { background: #111; border: 1px dashed #333; color: #333; cursor: default; }
        .msg-box { height: 80px; color: #00e5ff; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; line-height: 1.4; }
        .controls { display: grid; grid-template-columns: 1fr; gap: 10px; }
        button { padding: 16px; border-radius: 15px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .btn-next { background: #00e5ff; color: #000; }
        .btn-stop { background: #ff3d00; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="score-board">
        <div>PLAYER: <span id="p-score">0</span></div>
        <div>CPU: <span id="c-score">0</span></div>
    </div>

    <p style="font-size: 0.7rem; color: #888;">CPU'S FIELD</p>
    <div class="card-area" id="c-field">
        <div id="c-0" class="card">伏</div>
        <div id="c-1" class="card">伏</div>
        <div id="c-2" class="card">伏</div>
    </div>

    <div id="msg" class="msg-box">ベースにするカードを<br>1枚選んでください</div>

    <p style="font-size: 0.7rem; color: #888;">YOUR FIELD</p>
    <div class="card-area" id="p-field"></div>

    <div class="controls" id="ui-btns" style="display:none;">
        <button id="main-btn" class="btn-next" onclick="nextPhase()">加算フェーズへ</button>
        <button class="btn-stop" onclick="showdown()">今の数値で勝負！</button>
    </div>
</div>

<script>
    let pMatch = 0, cMatch = 0;
    let pHand, cHand, pData, cData, phase;

    function init() {
        pHand = [1, 0, -1].sort(() => Math.random() - 0.5);
        cHand = [1, 0, -1].sort(() => Math.random() - 0.5);
        pData = { base:null, add:0, mult:1, addSelected: false };
        cData = { base:null, add:0, mult:1, addSelected: false };
        phase = 1;

        document.getElementById('msg').innerHTML = "ベースにするカードを<br>1枚選んでください";
        document.getElementById('ui-btns').style.display = "none";
        for(let i=0; i<3; i++) {
            let c = document.getElementById(`c-${i}`);
            c.innerText = "伏"; c.className = "card";
        }
        renderPlayer();
    }

    function renderPlayer() {
        const area = document.getElementById('p-field');
        area.innerHTML = "";
        pHand.forEach((val, i) => {
            const el = document.createElement('div');
            el.className = val === "USED" ? "card used" : "card";
            el.innerText = (val === "USED") ? "済" : "伏";
            if(val !== "USED") el.onclick = () => tapCard(i);
            area.appendChild(el);
        });
    }

    function tapCard(idx) {
        if (phase === 1) {
            pData.base = pHand[idx];
            pHand[idx] = "USED";
            
            // CPUもベースを選ぶ
            let cIdx = Math.floor(Math.random() * 3);
            cData.base = cHand[cIdx];
            cHand[cIdx] = "USED";

            // 公開
            document.getElementById('p-field').children[idx].innerText = pData.base;
            document.getElementById('p-field').children[idx].className = "card open";
            document.getElementById(`c-${cIdx}`).innerText = cData.base;
            document.getElementById(`c-${cIdx}`).className = "card open";

            phase = 2;
            document.getElementById('msg').innerHTML = "次は【加算】です。<br>加算するか、今の数値で勝負か選べます。";
            document.getElementById('ui-btns').style.display = "grid";
            document.getElementById('main-btn').innerText = "加算カードを選ぶ";
        } else if (phase === 2 && !pData.addSelected) {
            // 加算カードの選択（自分にも伏せたまま）
            pData.add = pHand[idx];
            pHand[idx] = "USED";
            pData.addSelected = true;
            
            renderPlayer();
            // 選択したカードを「伏せ札として場に出ている」状態にする
            document.getElementById('p-field').children[idx].innerText = "加";
            document.getElementById('p-field').children[idx].className = "card hidden-active";

            // CPUの思考ロジック
            cpuThinkAdd();
        }
    }

    function cpuThinkAdd() {
        // CPUの戦略：ベースが低い、または一発逆転を狙う場合に加算
        let shouldAdd = false;
        let availIndices = [];
        cHand.forEach((v, i) => { if(v !== "USED") availIndices.push(i); });

        if (cData.base <= 0) shouldAdd = true; // 0以下ならとりあえず加算
        else if (Math.random() > 0.5) shouldAdd = true; // 50%でリスクを取る

        if (shouldAdd) {
            let cIdx = availIndices[Math.floor(Math.random() * availIndices.length)];
            cData.add = cHand[cIdx];
            cHand[cIdx] = "USED";
            cData.addSelected = true;
            document.getElementById(`c-${cIdx}`).innerText = "加";
            document.getElementById(`c-${cIdx}`).className = "card hidden-active";
            document.getElementById('msg').innerHTML = "CPUも加算を選びました。<br>次は【乗算】の選択です。";
        } else {
            document.getElementById('msg').innerHTML = "CPUは加算を見送りました。<br>次は【乗算】の選択です。";
        }

        phase = 3;
        document.getElementById('main-btn').innerText = "乗算フェーズへ";
    }

    function nextPhase() {
        if (phase === 2) {
            document.getElementById('msg').innerHTML = "加算するカードを<br>手札からタップしてください";
        } else if (phase === 3) {
            document.getElementById('msg').innerHTML = "最後のカードを乗算しますか？<br>「使う」なら手札をタップ、せず勝負なら赤ボタン。";
            document.getElementById('main-btn').style.display = "none";
            // 最後の1枚をタップできるように
            renderPlayer();
        }
    }

    // 乗算の選択（手札の最後の1枚をタップした場合）
    function tapCardForMult() {
        let lastIdx = pHand.findIndex(v => v !== "USED");
        pData.mult = pHand[lastIdx];
        pHand[lastIdx] = "USED";
        
        // CPUの乗算戦略
        let cLastVal = cHand.find(v => v !== "USED");
        let currentC = cData.base + cData.add;
        if (currentC * cLastVal > currentC) {
            cData.mult = cLastVal;
        }
        showdown();
    }

    // override tapCard for phase 3
    const originalTap = tapCard;
    tapCard = function(idx) {
        if(phase === 3) tapCardForMult();
        else originalTap(idx);
    };

    function showdown() {
        const pTotal = (pData.base + pData.add) * pData.mult;
        const cTotal = (cData.base + cData.add) * cData.mult;

        let res = `【結果】\nYOU: (${pData.base} + ${pData.add}) × ${pData.mult} = ${pTotal}\n`;
        res += `CPU: (${cData.base} + ${cData.add}) × ${cData.mult} = ${cTotal}\n\n`;

        if (pTotal > cTotal) { pMatch++; res += "勝利！"; }
        else if (pTotal < cTotal) { cMatch++; res += "敗北..."; }
        else { res += "引き分け"; }

        alert(res);
        document.getElementById('p-score').innerText = pMatch;
        document.getElementById('c-score').innerText = cMatch;

        if (pMatch >= 3 || cMatch >= 3) {
            alert(pMatch >= 3 ? "3勝達成！あなたの優勝！" : "CPUの優勝...");
            pMatch = 0; cMatch = 0;
            document.getElementById('p-score').innerText = "0";
            document.getElementById('c-score').innerText = "0";
        }
        init();
    }

    init();
</script>
</body>
</html>
